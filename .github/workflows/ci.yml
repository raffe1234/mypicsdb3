name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Verify source package structure
        run: python tools/verify.py

      - name: Run unit tests
        run: python -m pytest

      - name: Build complete release artifacts
        if: matrix.python-version == '3.11'
        run: python tools/build.py

      - name: Run Kodi add-on checker
        if: matrix.python-version == '3.11'
        run: |
          python -m pip install kodi-addon-checker
          kodi-addon-checker --branch omega \
            plugin.image.mypicsdb3 \
            repository.mypicsdb3 \
            build/skin.estuary.mypicsdb3

      - name: Upload build artifacts
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v6
        with:
          name: mypicsdb3-build
          path: |
            dist/*.zip
            dist/*.tar.gz
            dist/SHA256SUMS.txt
            dist/repository/**
          if-no-files-found: error
