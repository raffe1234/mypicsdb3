name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Cache official Estuary archives
        if: matrix.python-version == '3.11'
        uses: actions/cache@v6
        with:
          path: .cache/estuary
          key: estuary-${{ runner.os }}-${{ hashFiles('contrib/estuary/upstream.json') }}
          restore-keys: |
            estuary-${{ runner.os }}-

      - name: Install development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Verify source package structure
        run: python tools/verify.py

      - name: Run unit tests
        run: python -m pytest

      - name: Build latest Omega and Piers packages
        if: matrix.python-version == '3.11'
        run: python tools/build.py

      - name: Run Kodi add-on checker
        if: matrix.python-version == '3.11'
        run: |
          python -m pip install kodi-addon-checker==0.0.36
          OMEGA_SKIN=$(find build/estuary/omega -type d -name skin.estuary.mypicsdb3 -print -quit)
          PIERS_SKIN=$(find build/estuary/piers -type d -name skin.estuary.mypicsdb3 -print -quit)
          test -n "$OMEGA_SKIN"
          test -n "$PIERS_SKIN"
          # kodi-addon-checker 0.0.36 rejects the officially supported
          # minversion/maxversion attributes on repository <dir> nodes.
          # tools/verify.py validates repository.mypicsdb3 instead.
          python tools/run_kodi_addon_checker.py --branch omega \
            plugin.image.mypicsdb3 \
            "$OMEGA_SKIN"
          python tools/run_kodi_addon_checker.py --branch piers "$PIERS_SKIN"

      - name: Upload build artifacts
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v6
        with:
          name: mypicsdb3-build
          path: |
            dist/*.zip
            dist/*.tar.gz
            dist/SHA256SUMS.txt
            dist/repository/**
          if-no-files-found: error
