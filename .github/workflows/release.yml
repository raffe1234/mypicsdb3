name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Verify, test and build
        run: |
          python tools/verify.py
          python -m pytest
          python tools/build.py

      - name: Run Kodi add-on checker
        run: |
          python -m pip install kodi-addon-checker
          kodi-addon-checker --branch omega \
            plugin.image.mypicsdb3 \
            repository.mypicsdb3 \
            build/skin.estuary.mypicsdb3

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/*.zip dist/*.tar.gz dist/SHA256SUMS.txt --generate-notes --verify-tag
