name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache official Estuary archives
        uses: actions/cache@v6
        with:
          path: .cache/estuary
          key: estuary-${{ runner.os }}-${{ hashFiles('contrib/estuary/upstream.json') }}
          restore-keys: |
            estuary-${{ runner.os }}-

      - name: Install development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Verify, test and build
        run: |
          python tools/verify.py
          python -m pytest
          python tools/build.py

      - name: Run Kodi add-on checker
        run: |
          python -m pip install kodi-addon-checker==0.0.36
          OMEGA_SKIN=$(find build/estuary/omega -type d -name skin.estuary.mypicsdb3 -print -quit)
          PIERS_SKIN=$(find build/estuary/piers -type d -name skin.estuary.mypicsdb3 -print -quit)
          test -n "$OMEGA_SKIN"
          test -n "$PIERS_SKIN"
          # kodi-addon-checker 0.0.36 rejects the officially supported
          # minversion/maxversion attributes on repository <dir> nodes.
          # tools/verify.py validates repository.mypicsdb3 instead.
          python tools/run_kodi_addon_checker.py --branch omega \
            plugin.image.mypicsdb3 \
            "$OMEGA_SKIN"
          python tools/run_kodi_addon_checker.py --branch piers "$PIERS_SKIN"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/*.zip dist/*.tar.gz dist/SHA256SUMS.txt --generate-notes --verify-tag
