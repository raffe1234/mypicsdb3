name: MariaDB integration

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mariadb:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_DATABASE: mypicsdb3_test
          MARIADB_USER: mypicsdb3
          MARIADB_PASSWORD: mypicsdb3
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Run MariaDB integration test
        env:
          MYPICSDB3_TEST_MYSQL: "1"
          MYPICSDB3_MYSQL_HOST: 127.0.0.1
          MYPICSDB3_MYSQL_PORT: "3306"
          MYPICSDB3_MYSQL_DATABASE: mypicsdb3_test
          MYPICSDB3_MYSQL_USERNAME: mypicsdb3
          MYPICSDB3_MYSQL_PASSWORD: mypicsdb3
        run: python -m pytest tests/test_mysql_integration.py
